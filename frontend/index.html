<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon-ampersand.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Council</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (systemDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);

          // Phase 6 SET-04 — sync density before first paint (no system pref; default comfortable)
          var density = localStorage.getItem('density');
          if (density !== 'compact' && density !== 'comfortable') density = 'comfortable';
          document.documentElement.setAttribute('data-density', density);

          // Phase 6 SET-02 — sync font-size before first paint (rem-based tokens cascade)
          var fontSize = localStorage.getItem('fontSize');
          if (fontSize !== 's' && fontSize !== 'm' && fontSize !== 'l') fontSize = 'm';
          document.documentElement.setAttribute('data-fontsize', fontSize);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
          document.documentElement.setAttribute('data-density', 'comfortable');
          document.documentElement.setAttribute('data-fontsize', 'm');
        }
      })();
    </script>
    <link rel="preload" href="/fonts/SourceSerif4-Variable-Roman.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/Inter-Variable.woff2" as="font" type="font/woff2" crossorigin>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
